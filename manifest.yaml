      description: >
        Autonomous bug-finding workflow. Scan code for a specific class
        of bugs, apply fixes, build to verify, iterate on errors, and
        produce a findings report.
      persona: systems-engineer
      protocols: [anti-hallucination, self-verification, operational-constraints, minimal-edit-discipline]
      format: investigation-report

    - name: fix-compiler-warnings
      path: templates/fix-compiler-warnings.md
      description: >
        Systematic batch remediation of compiler warnings. Process
        warnings from SARIF or compiler output, apply rule-specific
        fix patterns, build-verify each fix, and discover new patterns.
      persona: systems-engineer
      protocols: [anti-hallucination, self-verification, operational-constraints, minimal-edit-discipline, compiler-diagnostics-cpp]
      format: structured-findings

    - name: investigate-security
      path: templates/investigate-security.md
      description: >
        Security audit of code or a system component. Systematic
        vulnerability analysis with severity classification.
      persona: security-auditor
      protocols: [anti-hallucination, self-verification, operational-constraints, security-vulnerability]
      taxonomies: [stack-lifetime-hazards]
      format: investigation-report

    - name: profile-session
      path: templates/profile-session.md
      description: >
        Analyze a completed LLM session log to identify token
        inefficiencies and structural waste. Maps execution back to
        PromptKit components and produces optimization recommendations.
      persona: specification-analyst
      protocols: [anti-hallucination, self-verification, session-profiling]
      format: investigation-report

    - name: classify-findings
      path: templates/classify-findings.md
      description: >
        Classify a set of findings against a reference catalog or taxonomy.
        Three-way classification (Exact Match / Variant / New Pattern) with
        justification, confidence analysis, and catalog update proposals.
      persona: systems-engineer
      protocols: [anti-hallucination, self-verification, finding-classification]
      format: structured-findings

  code-analysis:
    - name: review-code
      path: templates/review-code.md
      description: >
        Thorough code review for correctness, safety, security,
        and maintainability. Supports additional analysis protocols.
      persona: systems-engineer
      protocols: [anti-hallucination, self-verification, operational-constraints]
      taxonomies: [stack-lifetime-hazards]
      format: investigation-report

    - name: review-cpp-code
      path: templates/review-cpp-code.md
      description: >
        C/C++ specialized code review combining general review with
        research-validated best practices and memory safety analysis.
        Optionally applies Win32 API or performance-critical C patterns.
      persona: systems-engineer
      protocols: [anti-hallucination, self-verification, operational-constraints, cpp-best-practices, memory-safety-c]
      taxonomies: [cpp-review-patterns]
      format: investigation-report

    - name: exhaustive-bug-hunt
      path: templates/exhaustive-bug-hunt.md
      description: >
        Deep, adversarial, line-by-line code review optimized for defect
        discovery. Exhaustive path tracing with coverage proof and
        falsification discipline. Optionally applies kernel-specific
        analysis for OS code.
      persona: systems-engineer
      protocols: [anti-hallucination, self-verification, adversarial-falsification, exhaustive-path-tracing]
      taxonomies: [kernel-defect-categories]
      format: exhaustive-review-report

    - name: reconstruct-behavior
      path: templates/reconstruct-behavior.md
      description: >
        Reconstruct a behavioral model from an existing engineering
        artifact. Extracts state machines, control/signal flow, and
        implicit invariants from code, schematics, netlists,
        configurations, firmware images, or protocol captures.
      persona: reverse-engineer
      protocols: [anti-hallucination, self-verification, operational-constraints, invariant-extraction]
      format: behavioral-model

    - name: review-schematic
      path: templates/review-schematic.md
      description: >
        Audit a schematic or netlist against requirements and component
        datasheets. Checks power architecture, pin-level correctness,
        bus integrity, protection circuits, power sequencing, passive
        components, and completeness.
      persona: electrical-engineer
      protocols: [anti-hallucination, self-verification, schematic-compliance-audit]
      format: investigation-report

    - name: validate-simulation
      path: templates/validate-simulation.md
      description: >
        Review circuit simulation output (SPICE, power budget, thermal
        analysis) against specification constraints. Verifies setup,
        extracts results, checks compliance, assesses corner-case
        coverage, and evaluates model validity.
      persona: electrical-engineer
      protocols: [anti-hallucination, self-verification, simulation-validation]
      format: investigation-report

    - name: review-bom
      path: templates/review-bom.md
      description: >
        Audit a bill of materials against the schematic and requirements.
        Checks part number correctness, voltage and temperature ratings,
        package matches, cost compliance, sourcing risks, and
        completeness.
      persona: electrical-engineer
      protocols: [anti-hallucination, self-verification, bom-consistency]
      format: investigation-report

    - name: review-layout
      path: templates/review-layout.md
      description: >
        Audit a PCB layout against schematic intent and requirements.
        Reviews DRC output, trace widths, impedance control, ground
        plane integrity, component placement, thermal design, and
        manufacturing constraints.
      persona: electrical-engineer
      protocols: [anti-hallucination, self-verification, layout-design-review]
      format: investigation-report

    - name: audit-link-budget
      path: templates/audit-link-budget.md
      description: >
        Audit a wireless link budget for transmitter chain, path loss
        model validity, receiver chain, margin adequacy, regulatory
        compliance, and sensitivity to environmental assumptions.
      persona: rf-engineer
      protocols: [anti-hallucination, self-verification, link-budget-audit]
      format: investigation-report

    - name: review-enclosure
      path: templates/review-enclosure.md
      description: >
        Audit an enclosure design for an electronic assembly. Reviews
        PCB fit, environmental protection, thermal management, antenna
        compatibility, sensor access, manufacturing feasibility, and
        mounting provisions.
      persona: mechanical-engineer
      protocols: [anti-hallucination, self-verification, enclosure-design-review]
      format: investigation-report

  hardware-design:
    - name: design-schematic
      path: templates/design-schematic.md
      description: >
        Interactive schematic design session. Guides the user from
        project requirements through component selection to a complete
        KiCad schematic with adversarial audits at each gate.
      persona: electrical-engineer
      protocols: [anti-hallucination, self-verification, component-selection, component-selection-audit, schematic-design, schematic-compliance-audit]

