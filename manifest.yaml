      persona: electrical-engineer
      protocols: [anti-hallucination, self-verification, pcb-layout-design, layout-design-review]

    - name: emit-manufacturing-artifacts
      path: templates/emit-manufacturing-artifacts.md
      description: >
        Interactive manufacturing artifact generation session. Produces
        fab-ready Gerbers, drill files, BOM, pick-and-place, and
        assembly drawings with fab-specific formatting for JLCPCB
        and PCBWay.
      persona: electrical-engineer
      protocols: [anti-hallucination, self-verification, manufacturing-artifact-generation]

    - name: hardware-design-workflow
      path: templates/hardware-design-workflow.md
      description: >
        End-to-end hardware design workflow from initial idea to
        manufacturable artifacts. Guides through requirements,
        component selection, schematic, PCB layout, and manufacturing
        with adversarial audits and user review at every gate.
      persona: electrical-engineer
      protocols: [anti-hallucination, self-verification, requirements-elicitation, component-selection, component-selection-audit, schematic-design, schematic-compliance-audit, pcb-layout-design, layout-design-review, manufacturing-artifact-generation]

  testing:
    - name: discover-tests-for-changes
      path: templates/discover-tests-for-changes.md
      description: >
        Analyze local code changes to identify affected components and
        discover relevant tests. Finds test files near changed code,
        checks test configuration, and recommends execution strategy.
      persona: test-engineer
      protocols: [anti-hallucination, self-verification, operational-constraints]
      format: triage-report

    - name: scaffold-test-project
      path: templates/scaffold-test-project.md
      description: >
        Scaffold a complete test project with build configuration, test
        class boilerplate, and test runner setup for a given framework
        and language.
      persona: test-engineer
      protocols: [anti-hallucination, self-verification]
      format: implementation-plan

  planning:
    - name: plan-implementation
      path: templates/plan-implementation.md
      description: >
        Decompose a project into an actionable implementation plan
        with tasks, dependencies, and risk assessment. Supports two
        modes: "implementation" (new feature/project) and "refactoring"
        (safe, incremental transformation of existing code).
      persona: software-architect
      protocols: [anti-hallucination, self-verification]
      format: implementation-plan

  agent-authoring:
    - name: author-agent-instructions
      path: templates/author-agent-instructions.md
      description: >
        Assemble PromptKit components (persona, protocols) into composable
        agent skill files, custom agent definitions, or CLI skills. For
        GitHub Copilot, produces .github/instructions/*.instructions.md,
        .github/agents/*.agent.md, or .github/skills/*/SKILL.md. Also
        supports Claude Code (CLAUDE.md) and Cursor (.cursorrules).
      persona: promptkit-contributor
      protocols: [anti-hallucination, self-verification]
      format: agent-instructions

    - name: author-session-handoff
      path: templates/author-session-handoff.md
      description: >
        Generate a structured session handoff document capturing
        accomplishments, current state, remaining work, and a
        prioritized plan for the next session. Interactive workflow
        that gathers state and produces a handoff file.
      persona: systems-engineer
      protocols: [anti-hallucination, self-verification, session-handoff]

  contribution:
    - name: extend-library
      path: templates/extend-library.md
      description: >
        Guide a contributor through designing and building new PromptKit
        components. Interactive workflow producing PR-ready files.
      persona: promptkit-contributor
      protocols: [anti-hallucination, self-verification, promptkit-design]
      format: promptkit-pull-request

    - name: decompose-prompt
      path: templates/decompose-prompt.md
      description: >
        Reverse-engineer a hand-written prompt into PromptKit's semantic
        layers. Maps segments to existing components, flags improvements,
        and generates PR-ready files for novel components.
      persona: promptkit-contributor
      protocols: [anti-hallucination, self-verification, prompt-decomposition]
      format: promptkit-pull-request

    - name: audit-library-consistency
      path: templates/audit-library-consistency.md
      description: >
        Audit the PromptKit component library for overlap, redundancy,
        inconsistency, and consolidation opportunities. Finds protocol
        duplication, template near-duplicates, terminology drift, and
        stale cross-references.
      persona: specification-analyst
      protocols: [anti-hallucination, self-verification]
      format: investigation-report

    - name: audit-library-health
      path: templates/audit-library-health.md
      description: >
        Comprehensive health audit of the PromptKit component library.
        Four-pass analysis covering structural consistency, corpus
        safety for assimilation risks, runtime fitness assessment,
        and language determinism analysis. Produces a unified
        investigation report with PR-ready remediation recommendations.
      persona: specification-analyst
      protocols: [anti-hallucination, self-verification, operational-constraints, corpus-safety-audit, prompt-determinism-analysis]
      format: investigation-report

  devops:
    - name: author-pipeline
      path: templates/author-pipeline.md
      description: >
        Generate a production-ready CI/CD pipeline for a given application
        and target platform. Supports GitHub Actions, Azure DevOps, GitLab CI.
      persona: devops-engineer
      protocols: [anti-hallucination, self-verification, devops-platform-analysis]
      format: pipeline-spec

    - name: triage-issues
      path: templates/triage-issues.md
      description: >
        Triage and prioritize open issues or work items. Classify by
        priority and effort, identify patterns, recommend a workflow.
      persona: devops-engineer
      protocols: [anti-hallucination, self-verification]
      format: triage-report

    - name: triage-pull-requests
      path: templates/triage-pull-requests.md
      description: >
        Triage open pull requests to identify which need review, are stale,
        have conflicts, or are ready to merge. Prioritize review effort.
      persona: devops-engineer
      protocols: [anti-hallucination, self-verification]
      format: triage-report

    - name: root-cause-ci-failure
      path: templates/root-cause-ci-failure.md
      description: >
        Investigate a failing CI/CD pipeline run. Analyze logs, pipeline
        configuration, and platform behavior. Produce an investigation report.
      persona: devops-engineer
      protocols: [anti-hallucination, self-verification, root-cause-analysis, devops-platform-analysis]
      format: investigation-report

    - name: author-release
      path: templates/author-release.md
      description: >
        Generate structured release notes from commits, PRs, and issues
        between two versions. Changelog, breaking changes, upgrade instructions.
      persona: devops-engineer
      protocols: [anti-hallucination, self-verification]
      format: release-notes

    - name: review-infrastructure
      path: templates/review-infrastructure.md
      description: >
        Review infrastructure-as-code (Terraform, Bicep, ARM, Pulumi,
        CloudFormation) for correctness, security, and best practices.
      persona: devops-engineer
      protocols: [anti-hallucination, self-verification, security-vulnerability]
      format: investigation-report

    - name: generate-commit-message
      path: templates/generate-commit-message.md
      description: >
        Generate a structured commit message from staged git changes.
        Analyzes diffs to produce a Problem/Solution or Conventional
        Commits format message with file change summaries.
      persona: software-architect
      protocols: [anti-hallucination, self-verification]

  protocol-engineering:
    - name: evolve-protocol
      path: templates/evolve-protocol.md
      description: >
        Interactive protocol evolution session. Ingests an existing protocol
        specification, works with the user to design modifications, traces
        impact, verifies consistency, and produces a protocol delta document.
      persona: protocol-architect
      protocols: [anti-hallucination, self-verification, protocol-evolution]
      taxonomies: [protocol-change-categories]
      format: protocol-delta

    - name: analyze-protocol-conflicts
      path: templates/analyze-protocol-conflicts.md
      description: >
        Compare two protocol specifications to identify semantic conflicts,
        incompatible assumptions, and interoperability hazards. Produces
        an investigation report with resolution recommendations.
      persona: protocol-architect
      protocols: [anti-hallucination, self-verification, protocol-conflict-analysis]
      format: investigation-report

    - name: author-protocol-validation
      path: templates/author-protocol-validation.md
      description: >
        Derive a protocol validation specification from a protocol spec.
        Produces a test blueprint covering state machine coverage, message
        format conformance, error handling, and interoperability scenarios.
      persona: protocol-architect
      protocols: [anti-hallucination, self-verification, protocol-validation-design]
      format: protocol-validation-spec

  engineering-workflow:
    - name: engineering-workflow
      path: templates/engineering-workflow.md
      description: >
        Full incremental engineering workflow with human-in-the-loop
        review. Guides an agent through requirements discovery,
        specification changes, implementation changes, adversarial
        audits, and deliverable creation. Domain-agnostic.
      persona: configurable
      protocols: [anti-hallucination, self-verification, adversarial-falsification, operational-constraints, requirements-elicitation, iterative-refinement, change-propagation, traceability-audit, code-compliance-audit, test-compliance-audit]
      taxonomies: [specification-drift]

    - name: collaborate-requirements-change
      path: templates/collaborate-requirements-change.md
      description: >
        Interactive requirements discovery for incremental changes.
        Work with the user to understand, refine, and produce a
        structured requirements patch. Domain-agnostic.
      persona: configurable
      protocols: [anti-hallucination, self-verification, requirements-elicitation, iterative-refinement]
      format: structured-patch

    - name: generate-spec-changes
      path: templates/generate-spec-changes.md
      description: >
        Generate design and validation specification changes from a
        requirements patch. Propagates each requirement change to
        design sections and validation entries. Domain-agnostic.
      persona: configurable
      protocols: [anti-hallucination, self-verification, change-propagation]
      format: structured-patch

    - name: generate-implementation-changes
      path: templates/generate-implementation-changes.md
      description: >
        Generate implementation and verification changes from a
        specification patch. Propagates design and validation changes
        to implementation artifacts. Domain-agnostic.
      persona: configurable
      protocols: [anti-hallucination, self-verification, operational-constraints, change-propagation]
      format: structured-patch

    - name: audit-spec-alignment
      path: templates/audit-spec-alignment.md
      description: >
        Adversarial audit of specification patches against user intent.
        Verifies requirements, design, and validation changes faithfully
        represent what the user asked for. Domain-agnostic.
      persona: specification-analyst
      protocols: [anti-hallucination, self-verification, adversarial-falsification, traceability-audit]
      taxonomies: [specification-drift]
      format: investigation-report

    - name: audit-implementation-alignment
      path: templates/audit-implementation-alignment.md
      description: >
        Adversarial audit of implementation patches against specification
        deltas. Verifies implementation and verification changes correctly
        realize the specification changes. Domain-agnostic.
      persona: specification-analyst
      protocols: [anti-hallucination, self-verification, adversarial-falsification, operational-constraints, code-compliance-audit, test-compliance-audit]
      taxonomies: [specification-drift]
      format: investigation-report

    - name: spec-extraction-workflow
      path: templates/spec-extraction-workflow.md
      description: >
        Bootstrap any repository with a clean semantic baseline. Scans
        existing code, docs, tests, and issues, extracts draft specs,
        collaborates with the user to clarify intent, audits for
        consistency, and produces PR-ready spec files. Domain-agnostic
        complement to engineering-workflow.
      persona: configurable
      protocols: [anti-hallucination, self-verification, operational-constraints, adversarial-falsification, requirements-from-implementation, requirements-elicitation, iterative-refinement, traceability-audit]
      taxonomies: [specification-drift]

    - name: maintenance-workflow
      path: templates/maintenance-workflow.md
      description: >
        Periodic health check workflow. Re-audits requirements, design,
        validation, and implementation for drift, collaborates with the
        user to classify findings, generates corrective patches, and
        restores alignment. Domain-agnostic — completes the engineering
        lifecycle triad.
      persona: configurable
      protocols: [anti-hallucination, self-verification, adversarial-falsification, operational-constraints, traceability-audit, code-compliance-audit, test-compliance-audit, change-propagation, iterative-refinement]
      taxonomies: [specification-drift]

pipelines:
  document-lifecycle:
    description: >
      Full document lifecycle from requirements through validation.
      Each stage produces an artifact consumed by the next.
    stages:
      - template: author-requirements-doc
        produces: requirements-document
      - template: author-design-doc
        consumes: requirements-document
        produces: design-document
      - template: author-validation-plan
        consumes: requirements-document
        produces: validation-plan
      - template: audit-traceability
        consumes: [requirements-document, validation-plan]
        produces: investigation-report

  protocol-engineering:
    description: >
      Protocol specification lifecycle from requirements extraction
      through evolution and validation. Stages after extraction can
      be used independently or sequentially.
    stages:
      - template: extract-rfc-requirements
        produces: requirements-document
      - template: evolve-protocol
        produces: protocol-delta
      - template: author-protocol-validation
        produces: protocol-validation-spec
      - template: analyze-protocol-conflicts
        produces: investigation-report

  hardware-lifecycle:
    description: >
      Full hardware design lifecycle from requirements through
      manufacturing. Interleaves generative design stages with
      adversarial audit stages. Stages consume the artifacts
      declared in their contracts and may be used independently
      or sequentially as those artifacts become available. Audit
      stages provide an independent review pass even when the
      preceding design stage includes a self-audit. The full
      workflow can also be run as a single interactive session
      using the hardware-design-workflow template.
    stages:
      - template: author-requirements-doc
        produces: requirements-document
      - template: design-schematic
        produces: artifact-set
      - template: review-schematic
        consumes: [requirements-document, artifact-set]
        produces: investigation-report
      - template: validate-simulation
        consumes: requirements-document
        produces: investigation-report
      - template: review-bom
        consumes: [requirements-document, artifact-set]
        produces: investigation-report
      - template: design-pcb-layout
        consumes: artifact-set
        produces: artifact-set
      - template: review-layout
        consumes: [requirements-document, artifact-set]
        produces: investigation-report
      - template: emit-manufacturing-artifacts
        consumes: artifact-set
        produces: artifact-set

  engineering-workflow:
    description: >
      Domain-agnostic incremental engineering workflow with
      human-in-the-loop review. Propagates changes through
      requirements, specifications, and implementation with
      adversarial audits at each transition. Phases can loop
      back based on audit verdicts or user feedback.
    stages:
      - template: collaborate-requirements-change
        produces: requirements-patch
      - template: generate-spec-changes
        consumes: requirements-patch
        produces: spec-patch
      - template: audit-spec-alignment
        consumes: [requirements-patch, spec-patch]
        produces: investigation-report
      - template: generate-implementation-changes
        consumes: spec-patch
        produces: implementation-patch
      - template: audit-implementation-alignment
        consumes: [spec-patch, implementation-patch]
        produces: investigation-report
